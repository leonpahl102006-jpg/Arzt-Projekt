<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxis Chatbot</title>
  <link rel="stylesheet" href="Doc.Schubert.css" />
</head>
<body>

  <button id="chat-toggle">💬</button>

  <div id="chat-hint">Fragen zur Praxis?</div>

  <div id="chat-box">
    <div id="chat-header">
      <div>
        <strong>Praxis Elsdorf-Westermühlen</strong>
        <span>Online-Assistent</span>
      </div>
    </div>

    <div id="chat-messages">
      <div class="bot-message">
        Hallo 👋 Ich kann Ihnen bei Fragen zu Öffnungszeiten, Adresse, Kontakt und Leistungen helfen.
      </div>
    </div>

    <div id="chat-input-area">
      <input id="user-input" type="text" placeholder="Ihre Frage eingeben..." />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script src="Doc.schubert.js"></script>
</body>
</html>
